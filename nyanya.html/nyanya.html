<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }
    
    /* NAVIGATION */
    nav {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
    }
    
    nav a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }
    
    nav a:hover {
      color: #00ffff;
    }
    
    /* HOME */
    .home {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(135deg, #000, #222);
    }
    
    .home h1 {
      font-size: 50px;
      letter-spacing: 3px;
    }
    
    .home p {
      font-size: 20px;
      opacity: 0.8;
    }
    
    /* ABOUT */
    .about {
      padding: 80px;
      text-align: center;
      background: #151515;
    }
    
    /* GALLERY */
    .gallery {
      padding: 80px;
      text-align: center;
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    
    .gallery-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      transition: 0.3s;
    }
    
    .gallery-grid img:hover {
      transform: scale(1.05);
    }
    
    /* CONTACT */
    .contact {
      padding: 80px;
      text-align: center;
      background: #151515;
    }
    
    .contact p {
      margin: 10px;
      font-size: 18px;
    }
  </style>
  
</head>

<body>
  
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About Me</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
  
  <section id="home" class="home">
    <h1>tanginamo</h1>
    <p>mahilig sa bayabas</p>
  </section>
  
  <section id="about" class="about">
    <h2>About Me</h2>
    <p></p>
  </section>
  
  <section id="gallery" class="gallery">
    <h2>Gallery</h2>
    
    <div class="gallery-grid">
      <img src="">
      <img src="pic2.jpg">
      <img src="pic3.jpg">
      <img src="pic4.jpg">
    </div>
    
  </section>
  
  <section id="contact" class="contact">
    <h2>Contact</h2>
    <p>Email: </p>
    <p>Facebook: </p>
    <p>Instagram: </p>
  </section>
  
</body>

</html>
